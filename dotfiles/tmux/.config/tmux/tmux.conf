# Set prefix to Ctrl-a (more Emacs-friendly than Ctrl-b)
unbind C-b
set -g prefix M-z
bind M-z send-prefix

# mouse enable
setw -g mouse on

# start with window 1 (instead of 0)
set -g base-index 1

# start with pane 1 (instead of 0)
set -g pane-base-index 1

# save history
set -g history-limit 1000000

# renumber windows automatically
set -g renumber-windows on

# quick pane zoom
bind z resize-pane -Z

# Split panes using | and - (Emacs-style split keys)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Use Alt-arrow keys to resize panes
bind -n M-Left resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up resize-pane -U 5
bind -n M-Down resize-pane -D 5

# Easier pane navigation (Emacs-style with C-a + hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Set default terminal mode for better color support
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# Enable activity alerts (optional)
setw -g monitor-activity on
set -g visual-activity on

# no delay for escape key press
set -sg escape-time 0

# reload tmux config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# open new popup window scratchpad
bind a display-popup -w 90% -h 90% -E "tmux new-session -A -s scratch"

# Vi-mode for copy/paste, but only if you're comfortable with it
# Otherwise, you can skip these two lines
setw -g mode-keys vi
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send -X cancel

set -g set-clipboard on
set -ag update-environment "SSH_TTY"
set -g allow-passthrough on

# Status bar customization (optional)
set -g status-position top
set -g status-bg "#1D2021"
set -g status-fg "#D4BE98"
set -g status-left-length 40
set -g status-right-length 100
set -g status-style "fg=#A89984,bg=default"
set -g status-left "#[fg=#A9B665,bold]   #S #[fg=#A89984,nobold] | "
set -g status-right "#[fg=#E78A4E]%Y-%m-%d #[fg=#E78A4E]%H:%M "
set -g window-status-current-format "#[fg=#1D2021,bold]#[bg=#E78A4E] #I:#W #{?window_zoomed_flag, 󰍋 ,}"
set -g window-status-format " #I:#W "
set -g message-style "fg=#A89984,bg=default"
set -g mode-style "fg=#504945,bg=#7DAEA3"
set -g pane-border-style "fg=#504945"
set -g pane-active-border-style "fg=#A9B665"
