############################
# ENVIRONMENT
############################

env = HYPRCURSOR_SIZE,24

# Qt / Wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Electron / Chromium
env = NIXOS_OZONE_WL,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto

############################
# PROGRAMS
############################

$terminal     = ghostty
$fileManager  = thunar
$browser      = brave
$menu         = wofi
$window_list  = wofi --show window --insensitive
$run_app      = wofi --show run --prompt "run:"

$mainMod = SUPER

############################
# MONITORS
############################

# Internal display
monitor = eDP-1,3840x2400@60,0x0,2

# External display
monitor = HDMI-A-1,1920x1080@60,3840x0,1

############################
# AUTOSTART
############################

# D-Bus environment
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland

# Core services
exec-once = hyprpaper
exec-once = waybar
exec-once = dunst
exec-once = nm-applet

# Idle daemon
exec-once = systemctl --user start hypridle.service

# Cursor
exec-once = hyprctl setcursor Adwaita 24

# File manager daemon
exec-once = thunar --daemon

# Clipboard
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

############################
# GENERAL
############################

general {
    layout              = dwindle

    gaps_in             = 2
    gaps_out            = 1

    border_size         = 2

    col.active_border   = rgba(f5c2e7cc) rgba(cba6f7cc) 45deg
    col.inactive_border = rgba(585b70aa)

    resize_on_border    = true
}

############################
# DECORATION
############################

decoration {
    rounding            = 6

    active_opacity      = 1.0
    inactive_opacity    = 1.0

    shadow {
        enabled         = true
        range           = 4
        render_power    = 3
        color           = rgba(1a1a1aee)
    }

    blur {
        enabled             = true
        size                = 8
        passes              = 2
        new_optimizations   = true
    }
}

############################
# ANIMATIONS
############################

animations {
    enabled = no
}

############################
# LAYOUTS
############################

dwindle {
    preserve_split = true
}

master {
    new_status = master
    new_on_top = true
}

############################
# INPUT
############################

input {
    kb_layout  = br,us
    kb_options = caps:ctrl_modifier,grp:win_space_toggle

    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace

############################
# MISC
############################

misc {
    focus_on_activate        = true
    font_family              = JetBrains Mono Nerd Font

    disable_hyprland_logo    = true
    disable_splash_rendering = true
    force_default_wallpaper  = 0
}

ecosystem {
    no_update_news = true
}

debug {
    disable_logs = false
}

############################
# DEVICE CONFIG
############################

device {
    name        = epic-mouse-v1
    sensitivity = -0.5
}

############################
# WORKSPACES
############################

workspace = 1, persistent:false
workspace = 2, persistent:false
workspace = 3, persistent:false
workspace = 4, persistent:false
workspace = 5, persistent:false

############################
# KEYBINDS
############################

# Terminal / launcher
bind = $mainMod, T, exec, GTK_IM_MODULE=simple $terminal
bind = $mainMod, W, exec, $browser
bind = $mainMod, F, exec, $fileManager
bind = $mainMod, M, exec, $menu

bind = $mainMod ALT, W, exec, $window_list
bind = $mainMod ALT, R, exec, $run_app

############################
# WINDOW MANAGEMENT
############################

# Kill window
bind = ALT, F4, killactive

# Floating
bind = $mainMod SHIFT, F, togglefloating

# Pseudo tiling
bind = $mainMod, P, pseudo

# Focus movement
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, SEMICOLON, movefocus, r

# Move windows
bind = $mainMod CTRL, H, movewindow, l
bind = $mainMod CTRL, J, movewindow, d
bind = $mainMod CTRL, K, movewindow, u
bind = $mainMod CTRL, L, movewindow, r

# Resize windows
bind = $mainMod SHIFT, H, resizeactive, -20 0
bind = $mainMod SHIFT, J, resizeactive, 0 20
bind = $mainMod SHIFT, K, resizeactive, 0 -20
bind = $mainMod SHIFT, L, resizeactive, 20 0

############################
# SESSION
############################

# Logout menu
bind = $mainMod, Q, exec, wlogout

# Exit Hyprland
bind = $mainMod SHIFT, Q, exit

# Lock screen
bind = $mainMod, L, exec, \
    wpctl set-mute @DEFAULT_AUDIO_SINK@ 1 && hyprlock

############################
# SPECIAL WORKSPACE
############################

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

############################
# WORKSPACES
############################

# Switch workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

############################
# MOUSE ACTIONS
############################

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

############################
# SCREEN RECORDING
############################

bind = SUPER, F10, exec, quickrec
bind = SUPER, F11, exec, regionrec

############################
# SCREENSHOTS
############################

bind = SUPER, PRINT, exec, grimblast copy area
bind = SUPER SHIFT, PRINT, exec, grimblast save area ~/Pictures/Screenshots

############################
# AUDIO
############################

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

############################
# BRIGHTNESS
############################

bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

############################
# MEDIA PLAYBACK
############################

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause

############################
# LAPTOP LID
############################

bindl = , switch:on:Lid Switch, exec, hyprctl dispatch dpms off
bindl = , switch:off:Lid Switch, exec, hyprctl dispatch dpms on

############################
# WINDOW RULES
############################

# Browser workspace
windowrule = workspace 1 silent,match:class firefox

# Terminal workspace
windowrule = workspace 2 silent,match:class ^(Alacritty|alacritty|com.mitchellh.ghostty)$

# Editor workspace
windowrule = workspace 3 silent,match:class ^(Emacs|emacs)$

# Chromium browsers
windowrule = workspace 4 silent,match:class ^(google-chrome|Google-chrome|brave-browser)$

# Floating rules
windowrule = size 800 600, match:class ^(org.pulseaudio.pavucontrol)$, float = true
windowrule = match:class ^(pavucontrol)$, float = true
windowrule = match:class ^(nm-connection-editor)$, float = true
windowrule = match:class ^(blueman-manager)$, float = true
windowrule = match:class ^(org.gnome.Calculator)$, float = true
