############################
# ENVIRONMENT
############################

env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = NIXOS_OZONE_WL,1

############################
# PROGRAMS
############################

$terminal     = ghostty
$fileManager  = thunar
$browser      = brave
$menu         = wofi
$window_list  = wofi --show window --insensitive
$run_app      = wofi --show run --prompt "run:"

$mainMod = SUPER

############################
# MONITORS
############################

monitor = eDP-1,3840x2400@60,0x0,2
monitor = HDMI-A-1,1920x1080@60,1920x0,1

############################
# AUTOSTART
############################

exec-once = hyprpaper &
exec-once = waybar &
exec-once = dunst &
exec-once = nm-applet &

exec-once = systemctl --user start hypridle.service

exec-once = hyprctl setcursor Adwaita 24
exec-once = thunar --daemon

exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

############################
# GENERAL
############################

general {
    layout              = dwindle
    gaps_in             = 2
    gaps_out            = 1
    border_size         = 2

    col.active_border   = rgba(f5c2e7cc) rgba(cba6f7cc) 45deg
    col.inactive_border = rgba(585b70aa)

    resize_on_border    = false
    allow_tearing       = false
}

############################
# DECORATION
############################

decoration {
    rounding           = 6

    active_opacity     = 1.0
    inactive_opacity   = 1.0

    shadow {
        enabled        = true
        range          = 4
        render_power   = 3
        color          = rgba(1a1a1aee)
    }

    blur {
        enabled            = true
        size               = 8
        passes             = 2
        new_optimizations  = true
    }
}

############################
# ANIMATIONS
############################

animations {
    enabled = no
}

############################
# LAYOUTS
############################

dwindle {
    preserve_split = true
}

master {
    new_status = master
    new_on_top = true
}

############################
# INPUT
############################

input {
    kb_layout  = br,us
    kb_options = caps:ctrl_modifier,grp:win_space_toggle

    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace

############################
# MISC
############################

misc {
    focus_on_activate        = true
    font_family              = JetBrains Mono Nerd Font

    disable_hyprland_logo    = true
    disable_splash_rendering = true
    force_default_wallpaper  = 0
}

ecosystem {
    no_update_news = true
}

debug {
    disable_logs = false
}

############################
# DEVICE CONFIG
############################

device {
    name        = epic-mouse-v1
    sensitivity = -0.5
}

############################
# KEYBINDS
############################

# terminal / launcher
bind = $mainMod, T, exec, $terminal
bind = $mainMod, W, exec, $browser
bind = $mainMod, F, exec, $fileManager
bind = $mainMod, M, exec, $menu

bind = $mainMod ALT, W, exec, $window_list
bind = $mainMod ALT, R, exec, $run_app

# window management
bind = ALT, F4, killactive
bind = $mainMod SHIFT, F, togglefloating
bind = $mainMod, P, pseudo

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod CTRL, H, movewindow, l
bind = $mainMod CTRL, L, movewindow, r
bind = $mainMod CTRL, K, movewindow, u
bind = $mainMod CTRL, J, movewindow, d

bind = $mainMod SHIFT, H, resizeactive, -20 0
bind = $mainMod SHIFT, L, resizeactive,  20 0
bind = $mainMod SHIFT, K, resizeactive, 0 -20
bind = $mainMod SHIFT, J, resizeactive, 0  20

# session
bind = $mainMod, Q, exec, wlogout
bind = $mainMod SHIFT, Q, exit

bind = $mainMod, L, exec, \
    wpctl set-mute @DEFAULT_AUDIO_SINK@ 1 && hyprlock

# special workspace
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# workspace switching
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# move to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# workspace scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# mouse window actions
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# recording
bind = SUPER, F10, exec, quickrec
bind = SUPER, F11, exec, regionrec

# media
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# media playback
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause

# laptop lid
bindl = , switch:on:Lid Switch, exec, hyprctl dispatch dpms off
bindl = , switch:off:Lid Switch, exec, hyprctl dispatch dpms on

############################
# WINDOW RULES
############################

windowrule = workspace 1 silent,match:class firefox

windowrule = workspace 2 silent,match:class ^(alacritty|Alacritty)$
windowrule = workspace 2 silent,match:class ^(com.mitchellh.ghostty)$

windowrule = workspace 3 silent,match:class ^(emacs|Emacs)$

windowrule = workspace 4 silent,match:class Google-chrome
windowrule = workspace 4 silent,match:class google-chrome
windowrule = workspace 4 silent,match:class brave-browser
